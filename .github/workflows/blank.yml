# This is a basic workflow to help you get started with Actions

name: Weird w*rkflow shit

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: windows-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Runs a single command using the runners shell
      - name: Fetch pinggy
        run: powershell -Command "Invoke-WebRequest -Uri 'https://release-assets.githubusercontent.com/github-production-release-asset/1041863297/6189e108-3974-4467-8ebd-c5ca5c9e3dfe?sp=r&sv=2018-11-09&sr=b&spr=https&se=2026-04-25T12%3A37%3A23Z&rscd=attachment%3B+filename%3Dpinggy-win-x64.exe&rsct=application%2Foctet-stream&skoid=96c2d410-5711-43a1-aedd-ab1947aa7ab0&sktid=398a6654-997b-47e9-b12b-9515b896b4de&skt=2026-04-25T11%3A36%3A30Z&ske=2026-04-25T12%3A37%3A23Z&sks=b&skv=2018-11-09&sig=uGHO5s%2BNYmvOR66PN6EKn0fiWPZP5kpo8v0uoWmCJIA%3D&jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJnaXRodWIuY29tIiwiYXVkIjoicmVsZWFzZS1hc3NldHMuZ2l0aHVidXNlcmNvbnRlbnQuY29tIiwia2V5Ijoia2V5MSIsImV4cCI6MTc3NzEyMDAzNSwibmJmIjoxNzc3MTE4MjM1LCJwYXRoIjoicmVsZWFzZWFzc2V0cHJvZHVjdGlvbi5ibG9iLmNvcmUud2luZG93cy5uZXQifQ.Rvo9ZWFU2sAUjTMMyJHxkYNhVT5NS8hgBB6xoF5UKbU&response-content-disposition=attachment%3B%20filename%3Dpinggy-win-x64.exe&response-content-type=application%2Foctet-stream' -OutFile 'C:\woah_pinggy\'"       

      # Runs a set of commands using the runners shell
      - name: Enable RDP Server
        run: |
          reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
          netsh advfirewall firewall set rule group="remote desktop" new enable=Yes
      # Run another command
      - name: Start pinggy
        run: C:\woah_pinggy\pinggy.exe -p 443 -R0:localhost:8080 -L4300:localhost:4300 TOKEN@a.pinggy.io
